name: oasis3
description: |
  CDR-prediction subset of OASIS-3 (DWI MR with tensor-fittable run ∩
  complete UDS Form B4 (CDR) visit, paired within 365 days). Three
  per-subject 3D NIfTIs registered to MNI152: t1, fa, md. Target is
  CDR Sum-of-Boxes plus the six component scores. ~1013 subjects.

source:
  name: Open Access Series of Imaging Studies, Release 3 (OASIS-3)
  url: https://sites.wustl.edu/oasisbrains/home/oasis-3/
  data_dictionary: https://sites.wustl.edu/oasisbrains/files/2024/04/OASIS-3_Imaging_Data_Dictionary_v2.3-a93c947a586e7367.pdf
  hosting: https://nitrc.org/ir
  projects:
    - OASIS3          # MR (T1w, DWI), demographics, UDSb4 (CDR)

# NITRC-IR enforces the OASIS Data Use Agreement at account-creation
# time, so holding valid credentials is itself DUA confirmation — the
# pipeline does not prompt again.
dua:
  name: OASIS Data Use Agreement
  url: https://www.oasis-brains.org

# No Zenodo redistribution — OASIS data is DUA-restricted.
zenodo: null

cohort:
  inclusion:
    - has at least one MR session with a tensor-fittable DWI run
      (i.e. a DWI run whose SeriesDescription is not "Axial_DWI")
    - has at least one complete UDS Form B4 (CDR) visit (non-null
      CDRSUM and the six component scores)
    - some (DWI session, CDR visit) pair falls within 365 days
  expected_n: 1013

mni_template:
  # The MNI152 reference all image features are warped into.
  # Downloaded once on first pipeline run; cached in <dest>/mni152/.
  name: MNI152NLin2009cAsym
  resolution_mm: 1
  url: https://www.templateflow.org/

pipeline:
  # Records the exact env used to produce the processed derivative.
  python: "3.12.3"
  lockfile: pipeline/requirements.lock

outputs:
  # What the processed directory contains
  - "<sbj>_t1.nii.gz"
  - "<sbj>_fa.nii.gz"
  - "<sbj>_md.nii.gz"
  - mni_template.nii.gz
  - group_mask.nii.gz
  - cohort_sessions.csv     # subjects + chosen experiment IDs
  - covariates.csv          # xfeat
